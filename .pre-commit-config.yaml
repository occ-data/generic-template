repos:
  - repo: git@github.com:Yelp/detect-secrets
    rev: v1.5.0
    hooks:
      - id: detect-secrets
        name: Detect secrets using custom plugin
        args:
          - --baseline
          - .secrets.baseline
          - --plugin
          - detect-secrets-plugins/occ_regex.py
          - --word-list
          - .secrets.ignore
        additional_dependencies:
          - pyahocorasick
        exclude: .secrets.ignore  # exclude this file from being scanned

  - repo: https://github.com/pre-commit/pre-commit-hooks
    rev: v5.0.0
    hooks:
      - id: trailing-whitespace
        name: Remove trailing whitespace
      - id: end-of-file-fixer
        name: Ensure newline at end of file
      - id: no-commit-to-branch
        name: Prevent commits to protected branches
        args:
          - --branch=develop
          - --branch=master
          - --pattern=release/.*
